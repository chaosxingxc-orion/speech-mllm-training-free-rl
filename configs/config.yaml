defaults:
  - model: qwen2_audio
  - dataset: librispeech
  - rl: grpo
  - experiment: baseline
  - _self_

work_name: speech-mllm-training-free-rl
seed: 42

paths:
  data_dir: ${oc.env:SPEECHRL_DATA_DIR,${oc.env:HOME}/speechrl-data/datasets}
  ckpt_dir: ${oc.env:SPEECHRL_CKPT_DIR,${oc.env:HOME}/speechrl-data/checkpoints}
  mlflow_dir: ${oc.env:SPEECHRL_MLFLOW_DIR,${oc.env:HOME}/speechrl-data/mlruns}

tracking:
  backend: mlflow
  experiment: ${work_name}
